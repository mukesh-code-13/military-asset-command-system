version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: militaryassets
    volumes:
      - mongo_data:/data/db
    networks:
      - macs-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/militaryassets
      JWT_SECRET: development-secret-key
      NODE_ENV: development
      PORT: 5000
    depends_on:
      - mongodb
    networks:
      - macs-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - macs-network
    stdin_open: true
    tty: true

volumes:
  mongo_data:


networks:
  macs-network:
    driver: bridge
